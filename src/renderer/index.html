<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; img-src 'self' data:; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silicone Mold App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1b1d22;
        --fg: #f5f5f5;
        --muted: #9aa0a6;
        --accent: #4a9eff;
        --border: #333333;
        --topbar-h: 48px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
      }
      header.topbar {
        flex: 0 0 var(--topbar-h);
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
        background: var(--bg);
      }
      .topbar__left,
      .topbar__center,
      .topbar__right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar__left {
        justify-content: flex-start;
      }
      .topbar__center {
        justify-content: center;
      }
      .topbar__right {
        justify-content: flex-end;
      }
      .topbar__app-name {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.01em;
      }
      .topbar__version {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }
      .topbar__volume {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
        font-variant-numeric: tabular-nums;
      }
      .topbar__volume-label {
        color: var(--muted);
        font-size: 12px;
      }
      .topbar__volume-value {
        color: var(--fg);
        font-size: 13px;
        min-width: 10ch;
        text-align: right;
      }
      .units-toggle {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
      }
      .units-toggle button {
        appearance: none;
        background: transparent;
        color: var(--muted);
        border: none;
        border-radius: 0;
        padding: 4px 10px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .units-toggle button + button {
        border-left: 1px solid var(--border);
      }
      .units-toggle button.is-active {
        background: var(--accent);
        color: #0b0d10;
      }
      .units-toggle button:hover:not(.is-active) {
        color: var(--fg);
      }
      #viewport {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden;
        background: var(--bg);
        /* The WebGL canvas inherits 100%/100% from its own inline styles. */
      }
      button {
        appearance: none;
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 6px 12px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="topbar" data-testid="topbar">
        <!-- Populated by src/renderer/ui/topbar.ts on DOMContentLoaded -->
      </header>
      <div id="viewport" data-testid="viewport"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
