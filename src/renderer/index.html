<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silicone Mold App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1a1a1a;
        --fg: #f5f5f5;
        --muted: #9aa0a6;
        --accent: #4a9eff;
        --border: #333333;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0;
      }
      header .version {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
      }
      main p {
        color: var(--muted);
        margin: 0;
        max-width: 480px;
        text-align: center;
      }
      button {
        appearance: none;
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 8px 16px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Silicone Mold App</h1>
        <span class="version" data-testid="app-version">v…</span>
      </header>
      <main>
        <p>Placeholder shell. Import an STL to begin (coming soon).</p>
        <button type="button" data-testid="open-stl-btn" disabled>
          Open STL…
        </button>
      </main>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
