<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silicone Mold App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #1b1d22;
        --fg: #f5f5f5;
        --muted: #9aa0a6;
        --accent: #4a9eff;
        --border: #333333;
        --topbar-h: 48px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        font-size: 14px;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
      }
      header {
        flex: 0 0 var(--topbar-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
      }
      header .left,
      header .right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.01em;
      }
      header .version {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        font-size: 12px;
      }
      #viewport {
        flex: 1 1 auto;
        position: relative;
        overflow: hidden;
        background: var(--bg);
        /* The WebGL canvas inherits 100%/100% from its own inline styles. */
      }
      button {
        appearance: none;
        background: transparent;
        color: var(--fg);
        border: 1px solid var(--border);
        padding: 6px 12px;
        border-radius: 6px;
        font: inherit;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="left">
          <h1>Silicone Mold App</h1>
        </div>
        <div class="right">
          <button type="button" data-testid="open-stl-btn" disabled>
            Open STL…
          </button>
          <span class="version" data-testid="app-version">v…</span>
        </div>
      </header>
      <div id="viewport" data-testid="viewport"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
