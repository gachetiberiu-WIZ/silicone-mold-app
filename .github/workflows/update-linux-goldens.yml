name: update linux visual goldens

on:
  push:
    branches: [feat/brim-fillet]
  workflow_dispatch:

# One-shot chore: regenerate the `printable-parts-exploded.png` baseline
# under `tests/__screenshots__/linux-ci/visual/printable-parts-exploded.spec.ts-snapshots/`
# on the Linux runner (matching the visual-regression CI's SwiftShader
# environment) and commit it back to this branch. Scoped with the `if:`
# guard below so it can only fire on this feature branch — it cannot
# run against main. Removed in the last commit of this same PR (issue #96).
#
# Pattern copied from prior one-shot workflows (e.g. #65, #98). Uses
# `continue-on-error: true` on the generate step so a still-flaky run
# doesn't skip the commit + upload.

permissions:
  contents: write

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

jobs:
  regen:
    if: github.ref == 'refs/heads/feat/brim-fillet'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: feat/brim-fillet
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate printable-parts-exploded baseline (--update-snapshots)
        continue-on-error: true
        run: pnpm test:visual --update-snapshots -- tests/visual/printable-parts-exploded.spec.ts
      - name: List new goldens
        run: |
          echo "printable-parts-exploded snapshot dir:"
          find tests/__screenshots__/linux-ci/visual/printable-parts-exploded.spec.ts-snapshots -type f 2>/dev/null | sort
          echo "total printable-parts-exploded PNGs: $(find tests/__screenshots__/linux-ci/visual/printable-parts-exploded.spec.ts-snapshots -type f -name '*.png' 2>/dev/null | wc -l)"
      - name: Commit baseline back to branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tests/__screenshots__/linux-ci
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(test): regenerate printable-parts-exploded golden for tapered brim (#96)"
          git push origin feat/brim-fillet
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
