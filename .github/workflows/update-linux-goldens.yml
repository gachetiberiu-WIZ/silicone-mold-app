name: update linux visual goldens (Wave D)

on:
  push:
    branches: [feat/geometry-base-slab]
  workflow_dispatch:

# One-shot chore: regenerate the visual-regression goldens invalidated by
# Wave D (issue #82 — base slab + 5th topbar readout + 2 new sidebar rows):
#
#   - sidebar-parameters-{defaults,inches}.png — two new rows (baseSlab*)
#     in the right sidebar make the form taller.
#   - topbar-all-volumes-{mm,in}.png — 5th readout "Base slab" shifts the
#     layout.
#   - topbar-stale-volumes-mm.png — same 5th readout shift.
#   - printable-parts-exploded.png — exploded view now animates shell +Y
#     and slab -Y in parallel; the frame contents differ from Wave C.
#   - generate-button-states / scene-* — layout may shift due to sidebar
#     row count.
#
# Branch-gated by the `if:` guard so it can only fire on this feature
# branch. MUST be removed in the final commit of this PR.
#
# Pattern copied from PR #63 / #65 / #70 / #72 / #80.

permissions:
  contents: write

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

jobs:
  regen:
    if: github.ref == 'refs/heads/feat/geometry-base-slab'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: feat/geometry-base-slab
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate baselines (--update-snapshots)
        continue-on-error: true
        run: pnpm test:visual --update-snapshots
      - name: List new goldens
        run: |
          echo "--- __screenshots__ tree ---"
          find tests/__screenshots__ -type f -name '*.png' 2>/dev/null | sort
          echo "total PNGs in __screenshots__: $(find tests/__screenshots__ -type f -name '*.png' 2>/dev/null | wc -l)"
      - name: Commit baselines back to branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tests/__screenshots__/linux-ci
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(test): regen Wave D linux baselines (slab + 5th topbar readout)"
          git push origin feat/geometry-base-slab
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
