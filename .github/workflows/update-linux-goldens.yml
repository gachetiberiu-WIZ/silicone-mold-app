name: update linux visual goldens

on:
  push:
    branches: [refactor/mold-strip-rename]
  workflow_dispatch:

# One-shot chore: regenerate the visual-regression goldens invalidated by
# the Wave-A single-silicone contract (issue #69):
#
#   - tests/__screenshots__/linux-ci/visual/silicone-exploded.spec.ts-snapshots/silicone-exploded.png
#       (the silicone body is now one mesh, not two halves moved apart).
#   - tests/__screenshots__/linux-ci/visual/sidebar-parameters.spec.ts-snapshots/
#       sidebar-parameters-defaults.png + sidebar-parameters-inches.png
#       (the sidebar drops from 8 rows to 4, with renamed labels).
#
# Pattern copied from PR #63 / #65 / #67. Branch-gated by the `if:` guard
# below so it can only fire on this feature branch. MUST be removed in
# the final commit of this PR — see the CLAUDE.md one-shot-workflow
# discipline (issues #66 / post-#67 cleanup lessons).

permissions:
  contents: write

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

jobs:
  regen:
    if: github.ref == 'refs/heads/refactor/mold-strip-rename'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: refactor/mold-strip-rename
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate baselines (--update-snapshots)
        continue-on-error: true
        run: >
          pnpm test:visual --update-snapshots --
          tests/visual/silicone-exploded.spec.ts
          tests/visual/sidebar-parameters.spec.ts
      - name: List new goldens
        run: |
          echo "silicone-exploded snapshot dir:"
          find tests/__screenshots__/linux-ci/visual/silicone-exploded.spec.ts-snapshots -type f 2>/dev/null | sort
          echo "sidebar-parameters snapshot dir:"
          find tests/__screenshots__/linux-ci/visual/sidebar-parameters.spec.ts-snapshots -type f 2>/dev/null | sort
          echo "total PNGs in __screenshots__: $(find tests/__screenshots__ -type f -name '*.png' 2>/dev/null | wc -l)"
      - name: Commit baselines back to branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tests/__screenshots__/linux-ci
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(test): regen silicone-exploded + sidebar-parameters linux baselines"
          git push origin refactor/mold-strip-rename
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
