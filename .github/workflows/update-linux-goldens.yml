name: Update Linux goldens (one-shot)

on:
  push:
    branches:
      - fix/brim-connect-through-center

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

permissions:
  contents: write

jobs:
  update-goldens:
    name: Regenerate visual-regression goldens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:visual --update-snapshots
        env:
          CI: "true"
      - name: Commit regenerated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'tests/__screenshots__/linux-ci' || true
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
          else
            git commit -m "chore(goldens): regenerate visual goldens for brim-connect fix"
            git push origin HEAD:${{ github.ref_name }}
          fi
