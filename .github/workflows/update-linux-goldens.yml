name: update linux visual goldens

on:
  push:
    branches: [feat/viewer-printable-preview]
  workflow_dispatch:

# One-shot chore: the printable-parts toolbar toggle is a visible
# addition to the topbar center slot. Existing topbar goldens
# (`topbar-all-volumes.spec.ts`, `topbar-units.spec.ts`) are now
# legitimately stale because the center now has one more button.
#
# Regenerate those baselines on the Linux runner (matching the
# visual-regression CI's SwiftShader environment) and commit back.
# Scoped with the `if:` guard below so it can only fire on this
# feature branch — it cannot run against main. Removed in the last
# commit of this same PR (issue #62).

permissions:
  contents: write

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

jobs:
  regen:
    if: github.ref == 'refs/heads/feat/viewer-printable-preview'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: feat/viewer-printable-preview
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Regenerate topbar baselines (--update-snapshots)
        continue-on-error: true
        run: pnpm test:visual --update-snapshots -- tests/visual/topbar-all-volumes.spec.ts tests/visual/topbar-units.spec.ts
      - name: List regenerated goldens
        run: |
          echo "topbar-all-volumes snapshot dir:"
          find tests/__screenshots__/linux-ci/visual/topbar-all-volumes.spec.ts-snapshots -type f 2>/dev/null | sort
          echo "topbar-units snapshot dir:"
          find tests/__screenshots__/linux-ci/visual/topbar-units.spec.ts-snapshots -type f 2>/dev/null | sort
      - name: Commit baselines back to branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tests/__screenshots__/linux-ci
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(test): regenerate topbar Linux CI baselines post-printable-toggle"
          git push origin feat/viewer-printable-preview
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
