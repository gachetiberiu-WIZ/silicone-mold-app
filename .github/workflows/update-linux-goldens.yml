name: update linux visual goldens

on:
  push:
    branches: [feat/geometry-surface-conforming-shell]
  workflow_dispatch:

# One-shot chore: regenerate the visual-regression goldens invalidated by
# the Wave-C surface-conforming print-shell pipeline (issue #72):
#
#   - tests/__screenshots__/linux-ci/visual/silicone-exploded.spec.ts-snapshots/silicone-exploded.png
#       (silicone bbox changes slightly due to the 1.5→2.0 mm edgeLength
#       bump; camera-frame union with the new print shell shifts the
#       overall framing).
#   - tests/__screenshots__/linux-ci/visual/printable-parts-exploded.spec.ts-snapshots/printable-parts-exploded.png
#       (mold geometry is fundamentally different — single surface-
#       conforming shell vs rectangular box + N sides + top cap).
#   - tests/__screenshots__/linux-ci/visual/topbar-all-volumes.spec.ts-snapshots/
#       topbar-all-volumes-{mm,in}.png — 4th "Print shell" readout.
#   - tests/__screenshots__/linux-ci/visual/topbar-stale-volumes.spec.ts-snapshots/
#       topbar-stale-volumes-mm.png — 4th readout + stale mute.
#
# Pattern copied from PR #63 / #65 / #67 / #70. Branch-gated by the `if:`
# guard below so it can only fire on this feature branch. MUST be removed
# in the final commit of this PR — see CLAUDE.md / past PRs #66 + post-
# #67 lessons on one-shot-workflow cleanup discipline.

permissions:
  contents: write

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

jobs:
  regen:
    if: github.ref == 'refs/heads/feat/geometry-surface-conforming-shell'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: feat/geometry-surface-conforming-shell
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate baselines (--update-snapshots)
        continue-on-error: true
        run: >
          pnpm test:visual --update-snapshots --
          tests/visual/silicone-exploded.spec.ts
          tests/visual/printable-parts-exploded.spec.ts
          tests/visual/topbar-all-volumes.spec.ts
          tests/visual/topbar-stale-volumes.spec.ts
      - name: List new goldens
        run: |
          for d in silicone-exploded printable-parts-exploded topbar-all-volumes topbar-stale-volumes; do
            echo "--- $d ---"
            find "tests/__screenshots__/linux-ci/visual/${d}.spec.ts-snapshots" -type f 2>/dev/null | sort
          done
          echo "total PNGs in __screenshots__: $(find tests/__screenshots__ -type f -name '*.png' 2>/dev/null | wc -l)"
      - name: Commit baselines back to branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tests/__screenshots__/linux-ci
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(test): regen silicone + printable + topbar linux baselines"
          git push origin feat/geometry-surface-conforming-shell
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
