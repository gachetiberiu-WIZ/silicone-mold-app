name: update linux visual goldens (one-shot)
on:
  push:
    branches:
      - feat/ui-dimensions-panel
jobs:
  update:
    if: github.ref == 'refs/heads/feat/ui-dimensions-panel'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:visual --update-snapshots
        continue-on-error: true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/__screenshots__/linux-ci
          if ! git diff --cached --quiet; then
            git commit -m "chore(test): regen generate-button-states linux baselines (round 2)"
            git push
          else
            echo "no golden changes to commit"
          fi
