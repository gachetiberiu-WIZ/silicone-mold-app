name: update linux visual goldens (round 2)

on:
  push:
    branches: [feat/geometry-surface-conforming-shell]
  workflow_dispatch:

# Second one-shot chore: the first round (commit db0790a) regenerated the
# 4 goldens invalidated by the Wave-C geometry + topbar-4th-readout.
# The first PR CI run surfaced that `topbar-units.spec.ts` ALSO has 4
# goldens invalidated by the new 4th readout (horizontal layout shift
# beyond the 0.01 ratio threshold):
#
#   - topbar-mm-empty.png, topbar-in-empty.png
#   - topbar-mm-mini-figurine.png, topbar-in-mini-figurine.png
#
# Re-run just that spec. Then remove this workflow in the final commit
# (same discipline as round 1).

permissions:
  contents: write

concurrency:
  group: update-linux-goldens-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: "10.33.0"
  NODE_VERSION: "22"

jobs:
  regen:
    if: github.ref == 'refs/heads/feat/geometry-surface-conforming-shell'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: feat/geometry-surface-conforming-shell
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate baselines (--update-snapshots)
        continue-on-error: true
        run: pnpm test:visual --update-snapshots -- tests/visual/topbar-units.spec.ts
      - name: List new goldens
        run: |
          find "tests/__screenshots__/linux-ci/visual/topbar-units.spec.ts-snapshots" -type f 2>/dev/null | sort
      - name: Commit baselines back to branch
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tests/__screenshots__/linux-ci
          if git diff --cached --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "chore(test): regen topbar-units linux baselines (4th readout shift)"
          git push origin feat/geometry-surface-conforming-shell
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3
